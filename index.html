<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Experience | Faction Name</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="hero-container">
        
        <header class="top-nav">
            <h1>PROJECT TITLE</h1>
        </header>

        <section class="character-grid">
            <div class="card" id="character-1">
                <div class="card-content">
                    <h2>The Guardian</h2>
                    <p>Faction: The Vanguard</p>
                </div>
            </div>

            <div class="card" id="character-2">
                <div class="card-content">
                    <h2>The Shadow</h2>
                    <p>Faction: The Void</p>
                </div>
            </div>

            <div class="card" id="character-3">
                <div class="card-content">
                    <h2>The Scholar</h2>
                    <p>Faction: The Archives</p>
                </div>
            </div>
        </section>

        <footer class="footer-info">
            <p>Design Intent: Interactive Hero Screen</p>
        </footer>

    </main>

    <script src="script.js"></script>
</body>
</html>
