<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vault of Resonance</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bungee&family=JetBrains+Mono:wght@100;400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=VT323&display=swap" rel="stylesheet">
    
    <style>
        /* 1. Global Variables & Foundation */
        :root {
            --bg-color: #0A0A0A;
            --accent-color: #E2B04D; /* Defaults to Analog Brass */
            --font-body: 'JetBrains Mono', monospace;
            --font-heading: 'Archivo Black', sans-serif;
            --transition-spring: 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: var(--font-body);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* 2. The Stage (Static Elements) */
        .grain-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 1000;
        }

        .ghost-title {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: var(--font-heading);
            font-size: 20vw;
            color: transparent;
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.05);
            z-index: 0;
            letter-spacing: -0.02em;
            transition: transform var(--transition-spring);
        }

        .spotlight {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, var(--accent-color) 0%, transparent 60%);
            opacity: 0.15;
            z-index: 1;
            filter: blur(50px);
            transition: background var(--transition-spring), transform var(--transition-spring);
        }

        .floor {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 30vh;
            background: linear-gradient(to bottom, rgba(255,255,255,0.05) 0%, var(--bg-color) 100%);
            z-index: 2;
            pointer-events: none;
        }

        /* 3. The HUD (Minimalist UI) */
        .hud {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            padding: 2rem;
            z-index: 500;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .hud-top, .hud-bottom {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .hud-year {
            font-family: var(--font-body);
            font-size: 1rem;
            color: var(--accent-color);
            transition: color var(--transition-spring);
        }

        .hud-index {
            font-size: 0.8rem;
            opacity: 0.6;
        }

        .spec-sheet {
            display: grid;
            grid-template-columns: 1fr;
            gap: 5px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            opacity: 0.7;
        }

        .visualizer {
            display: flex;
            gap: 4px;
            align-items: flex-end;
            height: 20px;
        }

        .bar {
            width: 4px;
            background-color: var(--accent-color);
            animation: bounce 1s infinite alternate;
            transition: background-color var(--transition-spring);
        }
        .bar:nth-child(2) { animation-delay: 0.2s; }
        .bar:nth-child(3) { animation-delay: 0.4s; }
        .bar:nth-child(4) { animation-delay: 0.6s; }

        @keyframes bounce {
            0% { height: 5px; }
            100% { height: 20px; }
        }

        /* 4. The Typography Hierarchy */
        .header-container {
            position: absolute;
            top: 15%;
            width: 100%;
            text-align: center;
            z-index: 5;
            pointer-events: none;
        }

        .active-medium {
            font-family: var(--font-heading);
            font-size: 2rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
            transition: font-family 0.3s ease;
        }

        /* 5. The Rotary Carousel (Interactive Geometry) */
        .carousel-container {
            position: relative;
            width: 100vw;
            height: 50vh;
            perspective: 1200px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .item {
            position: absolute;
            width: 300px;
            height: 400px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            color: #fff;
            transition: var(--transition-spring);
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            pointer-events: auto;
            text-align: center;
            flex-direction: column;
            gap: 1rem;
            overflow: hidden; /* Contains the image */
        }

        /* Material / Aesthetic Mockups replaced with IMG tags */
        .item-visual {
            width: 100%;
            height: 70%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border-radius: 8px; /* Give it a card frame feel */
        }

        .item-visual img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }
        
        /* The iPod-specific styling is removed, it is now an image and uses blue */

        /* CSS 3D States */
        .item.active {
            transform: translateZ(100px) scale(1.2);
            opacity: 1;
            z-index: 100;
            box-shadow: 0 0 50px var(--accent-color);
        }

        .item.prev {
            transform: translateX(-35vw) translateZ(-100px) rotateY(45deg) scale(0.7);
            opacity: 0.4;
            z-index: 50;
            filter: grayscale(80%);
        }

        .item.next {
            transform: translateX(35vw) translateZ(-100px) rotateY(-45deg) scale(0.7);
            opacity: 0.4;
            z-index: 50;
            filter: grayscale(80%);
        }

        .item.hidden-left {
            transform: translateX(-60vw) translateZ(-200px) rotateY(60deg) scale(0.5);
            opacity: 0;
            z-index: 10;
        }

        .item.hidden-right {
            transform: translateX(60vw) translateZ(-200px) rotateY(-60deg) scale(0.5);
            opacity: 0;
            z-index: 10;
        }

        .nav-btn {
            position
